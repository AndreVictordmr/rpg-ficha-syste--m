<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RPG Fichas</title>
    </head>
    <body>
        <header>
        <h1>RPG Fichas</h1>
        <hr>
        <p>Bem vindo ao sistema RPG Fichas ⚔️</p>
        <ul>
            <li>Cria nova Ficha</li>
            <li>Lista da Ficha</li>
            <li>Fazer uma rolagem</li>
        </ul>
        </header>
        <main>
            <section class="form">
                <div class="nomeForm">
                    <input type="number" hidden id="id">
                    <label for="name"></label>
                    <input type="text" id="nome" placeholder="Nome personagem">
                </div>
                <button type="button" class="btn_plus">Adicionar Atributos</button>
                <div class="atribuForm">
                    <div class="atributo">
                        <button type="button" class="btn_incremeto">+</button>
                    </div>
                </div>
                <button type="button" class="btn_plus">Adicionar Habilidades</button>
                <div class="skillForm">
                    <div class="skill">
                        <button type="button" class="btn_incremeto">+</button>
                    </div>
                </div>
                <button id="btnForm">Criar Ficha</button>
            </section>
            <section id="lista">
                <h2>Lista de Personagem</h2>
                <div id="Campolista">
                    <ul id="select"></ul>
                </div>
            </section>

        </main>


    <script src=""></script>
    </body>
</html>
